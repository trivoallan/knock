name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

      - name: mypy strict
        run: uv run mypy houba

      - name: reference docs in sync (regenerate, fail on drift)
        run: |
          uv run --group docs python scripts/gen_reference.py
          git diff --exit-code -- docs/reference \
            || { echo "::error::docs/reference is stale — run 'make reference' and commit."; exit 1; }

  test:
    name: test (pytest + coverage gates)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --frozen

      - name: pytest (global coverage ≥ 80%)
        env:
          REDIS_TEST_ADDR: 127.0.0.1:6379
        run: uv run pytest -v --cov=houba --cov-report=term-missing --cov-fail-under=80

      - name: pytest domain (coverage ≥ 90%)
        run: uv run pytest tests/unit/domain -v --cov=houba.domain --cov-report=term-missing --cov-fail-under=90

  manifests:
    name: manifests (kustomize render + dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install tools (envsubst + PyYAML)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gettext-base python3-yaml

      - name: Render the ArgoCD kustomize sources
        run: |
          set -euo pipefail
          for src in houba buildkitd registry; do
            echo "== rendering deploy/argocd/sources/$src =="
            kubectl kustomize --load-restrictor LoadRestrictionsNone "deploy/argocd/sources/$src" >/dev/null
          done

      - name: Validate the ArgoCD Application manifests (parse + pinned Helm revision)
        run: |
          set -euo pipefail
          # Helm-source children (eso/openbao) are rendered in-cluster by ArgoCD, not by
          # kustomize — here we only check the Application manifests parse and carry a
          # pinned chart targetRevision.
          for f in deploy/argocd/apps/*.yaml; do
            echo "== $f =="
            python3 -c "import yaml; d=yaml.safe_load(open('$f')); assert d['kind']=='Application', '$f not an Application'; s=d['spec']['source']; assert 'chart' not in s or s.get('targetRevision'), '$f Helm chart missing targetRevision'"
          done

      - name: Verify root.yaml renders
        run: |
          set -euo pipefail
          ARGOCD_REPO_URL=https://github.com/trivoallan/houba ARGOCD_REPO_REF=main \
            envsubst < deploy/argocd/root.yaml \
            | python3 -c "import yaml,sys; d=yaml.safe_load(sys.stdin); assert d['spec']['source']['path']=='deploy/argocd/apps', d['spec']['source']['path']"

  docker-build:
    name: docker build (runtime image)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build runtime image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: false
          load: true              # load the built image into the docker daemon so the smoke test can run it
          tags: houba:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          docker run --rm houba:ci-${{ github.sha }} version
          docker run --rm --entrypoint sh houba:ci-${{ github.sha }} -c \
            'command -v buildctl'
