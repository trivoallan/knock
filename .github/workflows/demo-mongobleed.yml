name: demo-mongobleed

# On-demand only (workflow_dispatch). This is a heavy kind e2e that pulls large
# images from Docker Hub inside kind; it must never gate PRs automatically — run
# it manually when validating the demo.
# Two gates:
#   1. spike-mongobleed.sh — regression guard: grype+trivy report 0 CVE-2025-14847,
#      syft inventory ≥ 1.  Catches scanner-DB drift early, before the full demo.
#   2. make demo-mongobleed — full kind e2e: local stack up, mongo corpus seeded,
#      brownfield reconcile, Act 1 (scanner blind spot) + Act 2 (XZ gate).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spike:
    name: spike (regression guard — scanner blind spot premise)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin v0.87.0

      - name: Install trivy
        run: |
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v0.71.2/trivy_0.71.2_Linux-64bit.tar.gz" -o /tmp/trivy.tgz
          tar -xzf /tmp/trivy.tgz -C /usr/local/bin trivy
          trivy --version

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin v1.45.1

      - name: Prime grype DB (once; spike uses GRYPE_DB_AUTO_UPDATE=false)
        run: GRYPE_DB_AUTO_UPDATE=true grype db update

      - name: spike-mongobleed (Act 1 premise — scanners miss it, syft catches it)
        run: scripts/spike-mongobleed.sh

  kind-e2e:
    name: kind e2e (demo-mongobleed)
    runs-on: ubuntu-latest
    needs: spike
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Install kind
        run: |
          curl -sSfL https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64 -o /tmp/kind
          sudo install -m 0755 /tmp/kind /usr/local/bin/kind   # runner pre-ships a root-owned kind

      - name: Install kubectl
        run: |
          curl -sSfL "https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl" -o /tmp/kubectl
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl

      - name: Install kustomize
        run: |
          curl -sSfL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" \
            | bash -s -- 5.6.0 /tmp
          sudo install -m 0755 /tmp/kustomize /usr/local/bin/kustomize

      - name: Install regctl
        run: |
          curl -sSfL "https://github.com/regclient/regclient/releases/download/v0.11.5/regctl-linux-amd64" \
            -o /usr/local/bin/regctl && chmod +x /usr/local/bin/regctl

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin v1.45.1

      - name: Install grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin v0.87.0

      - name: Install trivy
        run: |
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v0.71.2/trivy_0.71.2_Linux-64bit.tar.gz" -o /tmp/trivy.tgz
          tar -xzf /tmp/trivy.tgz -C /usr/local/bin trivy
          trivy --version

      - name: Prime grype DB
        run: GRYPE_DB_AUTO_UPDATE=true grype db update

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build knock runtime image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: false
          load: true
          tags: knock:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create kind cluster + load image
        run: |
          kind create cluster --name knock-demo
          kind load docker-image knock:dev --name knock-demo

      - name: make demo-mongobleed
        run: make demo-mongobleed
