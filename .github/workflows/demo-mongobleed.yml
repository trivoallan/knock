name: demo-mongobleed

# Runs on PRs touching demo files + on-demand.
# Two gates:
#   1. spike-mongobleed.sh — regression guard: grype+trivy report 0 CVE-2025-14847,
#      syft inventory ≥ 1.  Catches scanner-DB drift early, before the full demo.
#   2. make demo-mongobleed — full kind e2e: local stack up, mongo corpus seeded,
#      brownfield reconcile, Act 1 (scanner blind spot) + Act 2 (XZ gate).

on:
  pull_request:
    paths:
      - scripts/demo-mongobleed.sh
      - scripts/demo-gate.sh
      - scripts/spike-mongobleed.sh
      - docs/examples/brownfield/**
      - Makefile
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spike:
    name: spike (regression guard — scanner blind spot premise)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin v0.87.0

      - name: Install trivy
        run: |
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v0.63.0/trivy_0.63.0_Linux-64bit.tar.gz" -o /tmp/trivy.tgz
          tar -xzf /tmp/trivy.tgz -C /usr/local/bin trivy
          trivy --version

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin v1.45.1

      - name: Prime grype DB (once; spike uses GRYPE_DB_AUTO_UPDATE=false)
        run: GRYPE_DB_AUTO_UPDATE=true grype db update

      - name: spike-mongobleed (Act 1 premise — scanners miss it, syft catches it)
        run: scripts/spike-mongobleed.sh

  kind-e2e:
    name: kind e2e (demo-mongobleed)
    runs-on: ubuntu-latest
    needs: spike
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Install kind
        run: |
          curl -sSfL https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64 \
            -o /usr/local/bin/kind && chmod +x /usr/local/bin/kind

      - name: Install kubectl
        run: |
          curl -sSfL "https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl

      - name: Install kustomize
        run: |
          curl -sSfL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" \
            | bash -s -- 5.6.0 /usr/local/bin

      - name: Install regctl
        run: |
          curl -sSfL "https://github.com/regclient/regclient/releases/download/v0.11.5/regctl-linux-amd64" \
            -o /usr/local/bin/regctl && chmod +x /usr/local/bin/regctl

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin v1.45.1

      - name: Install grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin v0.87.0

      - name: Install trivy
        run: |
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v0.63.0/trivy_0.63.0_Linux-64bit.tar.gz" -o /tmp/trivy.tgz
          tar -xzf /tmp/trivy.tgz -C /usr/local/bin trivy
          trivy --version

      - name: Prime grype DB
        run: GRYPE_DB_AUTO_UPDATE=true grype db update

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build houba runtime image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: false
          load: true
          tags: houba:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create kind cluster + load image
        run: |
          kind create cluster --name houba-demo
          kind load docker-image houba:dev --name houba-demo

      - name: make demo-mongobleed
        run: make demo-mongobleed
