name: release-please

on:
  push:
    branches:
      - main

# Least privilege at the workflow level; each job widens only what it needs.
permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # Surface the action's outputs so the publish job can gate on them.
    # Manifest config with a root package at "." exposes non-prefixed outputs.
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
    steps:
      # Needed so the re-lock step below can push to the release PR branch.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

      # Maintains a release PR from Conventional Commits; on merge it tags the
      # release, writes CHANGELOG.md, and bumps the version in pyproject.toml.
      # Config: release-please-config.json + .release-please-manifest.json.
      # While < 1.0.0, `feat:` bumps minor and breaking changes are capped at
      # minor (bump-minor-pre-major) — no automatic jump to 1.0.0.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          # Prefer a PAT (fine-grained: contents + pull-requests write) so the
          # release PR triggers CI; falls back to GITHUB_TOKEN until the
          # RELEASE_PLEASE_TOKEN secret is set (PRs opened by GITHUB_TOKEN do
          # not trigger workflows, so required checks can't report on them).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

      # release-please bumps pyproject.toml on the release PR but never re-locks, so
      # uv.lock's root version lags by one release. Re-sync it on that same PR branch.
      # ponytail: re-runs `uv lock` whole; fine — only the root version changes.
      - name: Re-lock uv.lock on the release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          BRANCH: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
        run: |
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          pipx run uv lock
          if ! git diff --quiet uv.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "chore(deps): sync uv.lock to the bumped version"
            git push origin "$BRANCH"
          fi

  # On a freshly-cut release, build and publish the signed, attested image.
  # Running here (same workflow run as the release) avoids the well-known gotcha
  # that a tag/release created by GITHUB_TOKEN does not trigger a separate
  # `on: release` / `on: push: tags` workflow.
  publish:
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GHCR
      id-token: write   # cosign keyless (OIDC -> Fulcio / Rekor)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags and OCI labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/houba
          # Branch event (push to main) -> the git ref is the branch, not the
          # tag, so derive tags from release-please outputs rather than semver
          # auto-detection.
          tags: |
            type=raw,value=${{ needs.release-please.outputs.version }}
            type=raw,value=${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.version=${{ needs.release-please.outputs.version }}

      - name: Build and push (multi-arch, SBOM + SLSA provenance)
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the pushed image (keyless)
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/houba
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Smoke-test the published image
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/houba
          DIGEST: ${{ steps.build.outputs.digest }}
        run: docker run --rm "${IMAGE}@${DIGEST}" version
