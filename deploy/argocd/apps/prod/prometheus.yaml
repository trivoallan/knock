apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.1.1
    helm:
      releaseName: kube-prometheus-stack
      values: |
        # Trim to the minimum houba needs: the Prometheus Operator (ServiceMonitor CRD)
        # + a Prometheus that scrapes buildkitd. No dashboards/alerting/host metrics.
        grafana:
          enabled: false
        alertmanager:
          enabled: false
        nodeExporter:
          enabled: false
        kubeStateMetrics:
          enabled: false
        prometheus:
          prometheusSpec:
            # Discover ServiceMonitors in any namespace (buildkitd's lives in houba).
            serviceMonitorSelectorNilUsesHelmValues: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
