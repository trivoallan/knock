# The App-of-Apps root. `make demo-argocd` (or kubectl) applies THIS only; ArgoCD then
# pulls the child Applications from git and syncs them. Parameterized via envsubst:
#   ARGOCD_REPO_URL  (default https://github.com/trivoallan/houba)
#   ARGOCD_REPO_REF  (default main)
#   ARGOCD_ENV       (demo | prod)
# To adopt: copy this file, hardcode your repoURL/targetRevision/env, kubectl apply.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: houba-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ${ARGOCD_REPO_URL}
    targetRevision: ${ARGOCD_REPO_REF}
    path: deploy/argocd/apps/${ARGOCD_ENV}
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
