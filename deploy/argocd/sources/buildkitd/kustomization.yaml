# buildkitd as its own additive ArgoCD app: the rootless build engine plus houba's
# autoscaling config (ScaledObject + ServiceMonitor). It references the SAME workload
# manifests the components/buildkitd Component ships (one source of truth), but NOT the
# Component's CronJob patch — the buildkitd host is wired via BUILDKIT_HOST in the
# houba-prod config instead, so no two apps write the houba CronJob.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: houba

resources:
  - ../../../components/buildkitd/deployment.yaml
  - ../../../components/buildkitd/service.yaml
  - ../../../components/buildkitd/networkpolicy.yaml
  - ../../../components/keda-buildkitd/scaledobject.yaml
  - ../../../components/keda-buildkitd/servicemonitor.yaml
