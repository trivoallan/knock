# buildkitd as its own additive ArgoCD app: the rootless build engine. References the
# SAME workload manifests the components/buildkitd Component ships (one source of truth),
# but NOT the Component's CronJob patch — the buildkitd host is wired via BUILDKIT_HOST in
# the knock source config instead, so no two apps write the knock CronJob.
# Autoscaling (KEDA ScaledObject + Prometheus ServiceMonitor) is an optional add-on; see
# components/keda-buildkitd and the runbook. It is intentionally NOT wired here.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: knock

resources:
  - ../../../components/buildkitd/deployment.yaml
  - ../../../components/buildkitd/service.yaml
  - ../../../components/buildkitd/networkpolicy.yaml
  - ../../../components/buildkitd/config.yaml
