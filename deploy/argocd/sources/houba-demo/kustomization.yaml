# Demo houba install for ArgoCD (copy path). Same base as every other deployment
# (anti-drift), the placeholder demo roster (reused from local-lite), and the
# busybox example as the git-sync'd policy. Differs from overlays/local-lite in two
# ways only: the registry is a SEPARATE ArgoCD app (not bundled here), and the
# CronJob is NOT suspended (ArgoCD/the demo run it on demand via a one-shot Job).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: houba

resources:
  - ../../../base
  - ../../../overlays/local-lite/secret-registries.yaml

generatorOptions:
  disableNameSuffixHash: true
