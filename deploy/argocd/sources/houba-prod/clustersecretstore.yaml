# Binds the existing externalsecret.yaml (which references a ClusterSecretStore named
# houba-secret-store) to the in-cluster OpenBao the prod root bootstraps. OpenBao is
# Vault-API compatible, so ESO drives it through its `vault` provider. In real prod,
# repoint this at the org's OpenBao/Vault/cloud SM, or harden the dev OpenBao.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: houba-secret-store
spec:
  provider:
    vault:
      server: http://openbao.openbao.svc.cluster.local:8200
      path: secret          # KV v2 mount (OpenBao dev default)
      version: v2
      auth:
        # Dev-mode root token, materialized as a Secret by the demo seed step.
        # Prod swaps this for Kubernetes auth (no static token).
        tokenSecretRef:
          name: openbao-token
          namespace: openbao
          key: token
