# Prod houba install for the ArgoCD variant. Composed à la carte from base (NOT from
# overlays/prod, which bundles the buildkitd/keda components — here those are sibling
# apps). Carries the prod image, the ESO ExternalSecret (reused from overlays/prod),
# the ClusterSecretStore that points it at OpenBao, and BUILDKIT_HOST in config so the
# buildkitd sibling app needs no CronJob patch.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: houba

resources:
  - ../../../base
  - ../../../overlays/prod/externalsecret.yaml
  - clustersecretstore.yaml

generatorOptions:
  disableNameSuffixHash: true

# Image: inherited from base (houba:dev — the locally-built image `make argocd-prod`
# loads into kind), so the prod App-of-Apps runs the current code on kind out of the
# box. When adopting, pin YOUR published image here, e.g.:
#   images:
#     - name: houba
#       newName: ghcr.io/<you>/houba
#       newTag: X.Y.Z

configMapGenerator:
  - name: houba-config
    behavior: merge
    literals:
      # Point houba's buildctl client at the buildkitd sibling app (the wiring the
      # buildkitd kustomize component used to inject via a CronJob patch).
      - BUILDKIT_HOST=tcp://buildkitd.houba.svc.cluster.local:1234
      # Policy repo (the front door). Defaults to the bundled busybox example so
      # `make argocd-prod` git-syncs a real policy on kind out of the box; when
      # adopting, repoint POLICY_REPO_URL + POLICY_DIR at YOUR org policy repo.
      - POLICY_REPO_URL=https://github.com/trivoallan/houba
      - POLICY_REPO_REF=main
      - POLICY_DIR=/policies/current/docs/examples/busybox
      - BLAST_REPOS=demo/busybox
