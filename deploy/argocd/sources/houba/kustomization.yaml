# The single houba install source for the Argo reference. Composed à la carte from
# base + the ESO ExternalSecret (now local to this source) + the ClusterSecretStore
# that points it at OpenBao + BUILDKIT_HOST so the buildkitd sibling app needs no patch.
# On kind this runs houba:dev (inherited from base) against the bundled reference policy.
# To adopt: pin YOUR published image here, point ESO at your vault, and repoint
# POLICY_REPO_URL + POLICY_DIR at YOUR org policy repo.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: houba

resources:
  - ../../../base
  - externalsecret.yaml
  - clustersecretstore.yaml

generatorOptions:
  disableNameSuffixHash: true

# Image: inherited from base (houba:dev — the image `make demo` loads into kind).
# When adopting, pin YOUR published image here, e.g.:
#   images:
#     - name: houba
#       newName: ghcr.io/<you>/houba
#       newTag: X.Y.Z

configMapGenerator:
  - name: houba-config
    behavior: merge
    literals:
      # Point houba's buildctl client at the buildkitd sibling app.
      - BUILDKIT_HOST=tcp://buildkitd.houba.svc.cluster.local:1234
      # Policy repo (the front door). Defaults to the bundled reference policy so
      # `make demo` git-syncs a real policy on kind out of the box; repoint at YOUR
      # org policy repo when adopting.
      - POLICY_REPO_URL=https://github.com/trivoallan/houba
      - POLICY_REPO_REF=main
      - POLICY_DIR=/policies/current/docs/examples/reference
      - BLAST_REPOS=demo/busybox demo/debian
      # Org-specific transform data lives here (policies only NAME these):
      #   HOUBA_TRANSFORM_CA_CERTS={"corp":{"path":"/etc/houba/certs/corp-root.pem"}}
      #   HOUBA_TRANSFORM_PACKAGE_MIRRORS={"corp":{"apt":"https://mirror.corp/debian"}}
