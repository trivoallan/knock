# Secrets are referenced, never embedded. This pulls the registry roster (host +
# robot-account token) from your secret backend via the External Secrets Operator,
# and materializes it as the `knock-registries` Secret the base consumes.
#
# Requires: External Secrets Operator installed + a ClusterSecretStore named
# `knock-secret-store` wired to your backend (Vault / AWS SM / GCP SM / …).
# Sealed Secrets is a fine alternative — drop a SealedSecret named `knock-registries`
# here instead and remove this file.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: knock-registries
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: knock-secret-store
    kind: ClusterSecretStore
  target:
    name: knock-registries
    creationPolicy: Owner
  data:
    - secretKey: KNOCK_REGISTRIES
      remoteRef:
        key: knock/registries
        property: KNOCK_REGISTRIES
