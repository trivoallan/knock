# The reference trigger: knock reconcile on a schedule.
# git-sync clones the policy repo (one-time) into a shared volume before knock runs;
# a merged PR on that repo is the operational form of "the front door is mandatory".
apiVersion: batch/v1
kind: CronJob
metadata:
  name: knock-reconcile
spec:
  schedule: "0 * * * *" # hourly — the 7-day digest-stability window makes any sub-daily cadence enough
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0 # a failed reconcile reports per-policy and exits; let the next schedule retry
      completionMode: Indexed
      completions: 1   # = N shards (= SHARD_COUNT in knock-config). Base is 1 (today's behaviour); overlays bump both together.
      parallelism: 1   # = M concurrent pods (M ≤ N; cap to protect buildkitd).
      template:
        metadata:
          labels:
            app.kubernetes.io/name: knock
            app.kubernetes.io/component: reconcile
        spec:
          serviceAccountName: knock
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: git-sync
              image: registry.k8s.io/git-sync/git-sync:v4.4.0
              args:
                - --repo=$(POLICY_REPO_URL)
                - --ref=$(POLICY_REPO_REF)
                - --root=/policies
                - --link=current
                - --one-time
                - --verbose=1
              envFrom:
                - configMapRef:
                    name: knock-config
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: policies
                  mountPath: /policies
          containers:
            - name: knock
              image: knock # rewritten by the kustomize images transformer
              command: ["/bin/sh", "-c"]
              args:
                ['exec knock reconcile "$POLICY_DIR" --shard-index "$JOB_COMPLETION_INDEX" --shard-count "$SHARD_COUNT"']
              env:
                # Source-registry auth (opt-in). DOCKER_CONFIG is read by BOTH regctl
                # (copy path) and buildctl (rebuild path); REGCTL_CONFIG keeps regctl's
                # own destination logins on the writable /tmp mount, off the read-only
                # Docker config. Seed the secret with `make docker-auth` to authenticate.
                - name: DOCKER_CONFIG
                  value: /docker-config
                - name: REGCTL_CONFIG
                  value: /tmp/.regctl/config.json
              envFrom:
                - configMapRef:
                    name: knock-config
                - secretRef:
                    name: knock-registries # provided per-overlay (literal / ExternalSecret)
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              volumeMounts:
                - name: policies
                  mountPath: /policies
                  readOnly: true
                - name: work
                  mountPath: /tmp
                - name: docker-config
                  mountPath: /docker-config
                  readOnly: true
          volumes:
            - name: policies
              emptyDir: {}
            - name: work
              emptyDir: {}
            # Opt-in source-registry auth: absent secret ⇒ empty mount ⇒ anonymous pulls.
            - name: docker-config
              secret:
                secretName: knock-docker-config
                optional: true
                items:
                  - key: config.json
                    path: config.json
