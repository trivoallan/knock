# One-shot Job: reads DT's Automation API key and mints it into the dt-api-key Secret.
# Runs after DT is up (sync-wave 2); the publish Job (wave 3) consumes the Secret.
apiVersion: batch/v1
kind: Job
metadata:
  name: knock-dt-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "2"   # after DT (wave 1) is synced
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: knock
        app.kubernetes.io/component: dt-bootstrap
    spec:
      serviceAccountName: dt-bootstrap
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: knock # rewritten by the kustomize images transformer; has python3
          command: ["python3", "/scripts/dt-bootstrap.py"]
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: knock-dt-bootstrap
            defaultMode: 0755
