# Runs an off-the-shelf analyzer (grype) on the SBOM knock attached, and attaches the SARIF.
# grype reads a LOCAL SBOM (no registry creds); regctl/knock do the registry I/O.
apiVersion: batch/v1
kind: Job
metadata:
  name: knock-scan-attach
  annotations:
    argocd.argoproj.io/sync-wave: "3"   # after reconcile placed + attached the SBOM
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: knock
        app.kubernetes.io/component: scan-attach
    spec:
      serviceAccountName: knock
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fetch-sbom            # knock image: pull each placed image's CycloneDX SBOM referrer
          image: knock                # rewritten by the kustomize images transformer; has regctl + python3
          command: ["bash", "/scripts/scan-attach.sh", "fetch"]
          env:
            - {name: HOME, value: /tmp}
            - {name: SHARED, value: /shared}
            - name: BLAST_REPOS
              valueFrom: {configMapKeyRef: {name: knock-config, key: BLAST_REPOS}}
          envFrom:
            - secretRef: {name: knock-registries}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          volumeMounts:
            - {name: scripts, mountPath: /scripts, readOnly: true}
            - {name: shared, mountPath: /shared}
            - {name: home, mountPath: /tmp}
        - name: grype                 # off-the-shelf grype, evaluates the local SBOM (no registry auth)
          # anchore/grype is distroless (no /bin/sh for the loop below) and runs as root; the
          # chainguard -dev variant ships busybox sh AND runs nonroot (satisfies the pod policy).
          # ponytail: -dev is a moving tag — pin a digest for reproducibility / air-gapped mirrors.
          image: cgr.dev/chainguard/grype:latest-dev
          command: ["sh", "-c"]
          args:
            - 'set -e; for f in /shared/*.sbom.json; do [ -e "$f" ] || continue; grype "sbom:$f" -o sarif --file "${f%.sbom.json}.sarif"; done'
          env:
            - {name: GRYPE_DB_CACHE_DIR, value: /tmp/grype}   # writable (readOnlyRootFilesystem)
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          volumeMounts:
            - {name: shared, mountPath: /shared}
            - {name: home, mountPath: /tmp}
      containers:
        - name: attach                # knock image: attach each SARIF as a signed referrer
          image: knock
          command: ["bash", "/scripts/scan-attach.sh", "attach"]
          env:
            - {name: HOME, value: /tmp}
            - {name: SHARED, value: /shared}
            - name: BLAST_REPOS
              valueFrom: {configMapKeyRef: {name: knock-config, key: BLAST_REPOS}}
          envFrom:
            - secretRef: {name: knock-registries}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          volumeMounts:
            - {name: scripts, mountPath: /scripts, readOnly: true}
            - {name: shared, mountPath: /shared}
            - {name: home, mountPath: /tmp}
      volumes:
        - {name: scripts, configMap: {name: knock-scan-attach, defaultMode: 0755}}
        - {name: shared, emptyDir: {}}
        - {name: home, emptyDir: {}}
