# houba reference deployment — runtime-neutral core.
#
# This base is identical across the Argo reference (make demo) and the local
# escape hatch (make local); they change ONLY the registry target, the secret
# source (ESO->OpenBao vs a plain Secret), the image, and whether the CronJob is
# suspended (the buildkitd rebuild add-on is present in both).
# That identity is what guarantees "the demo IS the blueprint" (no drift).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: houba

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - cronjob-reconcile.yaml
  - cronjob-gc.yaml
  - job-blast-radius.yaml

# Stable, predictable resource names (no content-hash suffix) so the on-demand
# blast-radius Job and the CronJob reference config/script by fixed name.
generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: houba-config
    literals:
      - HOUBA_LABEL_PREFIX=io.houba
      # Human-readable console logs in the reconcile/blast-radius Jobs — `make logs`
      # and `kubectl logs` are read by a person watching the demo, so text beats JSON
      # here (and matches houba's own default). Flip to json where a log pipeline
      # (Loki/ELK) ingests these structured events instead.
      - HOUBA_LOG_FORMAT=text
      - HOUBA_LOG_LEVEL=INFO
      - HOUBA_WORK_DIR=/tmp/houba-work
      # GitOps source of the policies (a merged PR here is the front door).
      # Overlays repoint these at the org's policy repo.
      - POLICY_REPO_URL=https://github.com/trivoallan/houba
      - POLICY_REPO_REF=main
      - POLICY_DIR=/policies/current/docs/examples/reference
      # Repos the blast-radius consumer walks (the reference policy: copy + rebuild).
      - BLAST_REPOS=demo/busybox demo/debian
      # Number of shards for the Indexed reconcile Job (= completions). Both
      # this value and jobTemplate.spec.completions must be bumped together per
      # overlay; base is 1 (identical to the former non-indexed behaviour).
      - SHARD_COUNT=1
  # The blast-radius consumer script, mounted into its Job. Canonical copy
  # lives at scripts/blast-radius.sh so it is also runnable standalone.
  - name: houba-blast-radius
    files:
      - blast-radius.sh=../../scripts/blast-radius.sh

# Container image is rewritten per overlay (houba:dev loaded into kind for the
# demos; a pinned ghcr.io tag in prod).
images:
  - name: houba
    newName: houba
    newTag: dev
