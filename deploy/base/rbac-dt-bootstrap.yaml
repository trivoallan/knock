apiVersion: v1
kind: ServiceAccount
metadata:
  name: dt-bootstrap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dt-bootstrap
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dt-bootstrap
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: dt-bootstrap }
subjects: [{ kind: ServiceAccount, name: dt-bootstrap }]
