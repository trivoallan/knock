# Point knock's buildctl client at the in-cluster buildkitd.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: knock-reconcile
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: knock
              env:
                - name: BUILDKIT_HOST
                  value: tcp://buildkitd.knock.svc.cluster.local:1234
