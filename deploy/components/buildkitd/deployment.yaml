# Rootless buildkitd — houba drives it over buildctl to run the hardening rebuild.
# Rootless keeps the security posture honest (no privileged container); the trade-off
# is the unconfined seccomp/apparmor profiles rootless needs. See the runbook for the
# mTLS hardening you SHOULD add before exposing this beyond a single-node demo.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
  labels:
    app.kubernetes.io/name: buildkitd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: buildkitd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: buildkitd
      annotations:
        container.apparmor.security.beta.kubernetes.io/buildkitd: unconfined
    spec:
      containers:
        - name: buildkitd
          image: moby/buildkit:v0.30.0-rootless
          args:
            - --addr
            - unix:///run/user/1000/buildkit/buildkitd.sock
            - --addr
            - tcp://0.0.0.0:1234
            - --oci-worker-no-process-sandbox
          ports:
            - containerPort: 1234
          readinessProbe:
            exec:
              command: ["buildctl", "debug", "workers"]
            initialDelaySeconds: 5
            periodSeconds: 30
          livenessProbe:
            exec:
              command: ["buildctl", "debug", "workers"]
            initialDelaySeconds: 5
            periodSeconds: 30
          securityContext:
            # Rootless buildkitd needs these unconfined; it does NOT need privilege.
            seccompProfile:
              type: Unconfined
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: buildkitd
              mountPath: /home/user/.local/share/buildkit
      volumes:
        - name: buildkitd
          emptyDir: {}
