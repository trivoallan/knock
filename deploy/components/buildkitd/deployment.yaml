# Rootless buildkitd — knock drives it over buildctl to run the hardening rebuild.
# Rootless keeps the security posture honest (no privileged container); the trade-off
# is the unconfined seccomp/apparmor profiles rootless needs. See the runbook for the
# mTLS hardening you SHOULD add before exposing this beyond a single-node demo.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
  labels:
    app.kubernetes.io/name: buildkitd
spec:
  # No static `replicas`: when the keda-buildkitd component is applied, the KEDA
  # ScaledObject owns the replica count (a fixed `replicas` would fight it). Absent
  # KEDA, the controller default of 1 == today's behaviour (goal 4 of the autoscaling spec).
  selector:
    matchLabels:
      app.kubernetes.io/name: buildkitd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: buildkitd
      annotations:
        container.apparmor.security.beta.kubernetes.io/buildkitd: unconfined
    spec:
      containers:
        - name: buildkitd
          image: moby/buildkit:v0.30.0-rootless
          args:
            - --addr
            - unix:///run/user/1000/buildkit/buildkitd.sock
            - --addr
            - tcp://0.0.0.0:1234
            - --oci-worker-no-process-sandbox
            # Prometheus metrics (OpenTelemetry) for KEDA autoscaling (keda-buildkitd component).
            - --debugaddr
            - 0.0.0.0:6060
            # Registry config: marks the plain-HTTP demo Zot so base-image PULLs (FROM the Zot)
            # use HTTP. Push-insecure is per-build (registry.insecure on the output).
            - --config
            - /etc/buildkit/buildkitd.toml
          ports:
            - name: grpc
              containerPort: 1234
            - name: metrics
              containerPort: 6060
          readinessProbe:
            exec:
              command: ["buildctl", "debug", "workers"]
            initialDelaySeconds: 5
            periodSeconds: 30
          livenessProbe:
            exec:
              command: ["buildctl", "debug", "workers"]
            initialDelaySeconds: 5
            periodSeconds: 30
          securityContext:
            # Rootless buildkitd needs these unconfined; it does NOT need privilege.
            seccompProfile:
              type: Unconfined
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: buildkitd
              mountPath: /home/user/.local/share/buildkit
            - name: config
              mountPath: /etc/buildkit
              readOnly: true
      volumes:
        - name: buildkitd
          emptyDir: {}
        - name: config
          configMap:
            name: buildkitd-config
