# Rebuild-path add-on: a rootless buildkitd plus the wiring that points houba at it.
# Used by the full demo and the prod blueprint; the lite demo (copy path) omits it.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
  - config.yaml

patches:
  - path: cronjob-buildkit-host.yaml
    target:
      kind: CronJob
      name: houba-reconcile
