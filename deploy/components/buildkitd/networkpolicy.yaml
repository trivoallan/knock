# buildkitd's TCP endpoint is unauthenticated, so restrict who can reach it.
# Only the knock reconcile pod may open the gRPC port. In production, add mTLS
# on top of this (client certs) — a NetworkPolicy is necessary, not sufficient.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: buildkitd-allow-reconcile
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: buildkitd
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: knock
              app.kubernetes.io/component: reconcile
        - podSelector:                       # the XZ incident fixture build also drives buildkitd
            matchLabels:
              app.kubernetes.io/name: knock
              app.kubernetes.io/component: seed-incident
      ports:
        - protocol: TCP
          port: 1234
