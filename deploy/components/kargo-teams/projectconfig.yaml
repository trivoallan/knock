# Auto-promotion for the two team pipelines: without it, Freight is discovered but never promoted
# past dev, so the gated prod Stages never receive Freight and their houba-scan-gate AnalysisRun
# never runs. With auto-promotion, kargo flows each team's Freight Warehouse → dev → prod, firing
# the gate: team-platform (clean busybox) passes and promotes; team-data (debian-xz, critical)
# is held. SUPERSET of the reference policy: ProjectConfig is a singleton per Project (name ==
# namespace), so this file — applied by `make demo-teams` after `make demo` — also re-lists the
# reference dev/prod Stages (deploy/components/kargo/projectconfig.yaml) so their auto-promotion
# is not dropped when this one replaces it.
#
# Requires kargo's Argo Rollouts integration to be ON, which means Argo Rollouts must be installed
# BEFORE kargo (kargo disables the integration at startup if the Rollouts CRDs are absent). The
# `demo` target orders argo-rollouts before kargo for this reason.
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: houba
  namespace: houba
spec:
  promotionPolicies:
    # Reference pipeline (kept in sync with deploy/components/kargo/projectconfig.yaml).
    - stage: dev
      autoPromotionEnabled: true
    - stage: prod
      autoPromotionEnabled: true
    # Team pipelines.
    - stage: platform-dev
      autoPromotionEnabled: true
    - stage: platform-prod
      autoPromotionEnabled: true
    - stage: data-dev
      autoPromotionEnabled: true
    - stage: data-prod
      autoPromotionEnabled: true
