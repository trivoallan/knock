# Auto-promotion for the reference dev→prod pipeline. Without it, the Warehouse discovers
# log4shell Freight but never promotes it past dev, so the gated prod Stage never receives
# Freight and the houba-scan-gate AnalysisRun never runs. With auto-promotion, kargo flows the
# Freight Warehouse → dev → prod, firing the gate live: it HOLDS log4shell (no signed scan), and
# the held AnalysisRun is visible in the kargo UI (beat 3a).
#
# Requires kargo's Argo Rollouts integration to be ON, which means Argo Rollouts must be
# installed BEFORE kargo (kargo disables the integration at startup if the Rollouts CRDs are
# absent). The `demo` target orders argo-rollouts before kargo for this reason.
#
# NOTE: ProjectConfig is a singleton per Project (name == namespace). The teams pipeline ships a
# SUPERSET of this list (deploy/components/kargo-teams/projectconfig.yaml: dev/prod + the four
# team Stages) so `make demo-teams`, applied after `make demo`, does not drop these entries.
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: houba
  namespace: houba
spec:
  promotionPolicies:
    - stage: dev
      autoPromotionEnabled: true
    - stage: prod
      autoPromotionEnabled: true
