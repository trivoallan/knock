apiVersion: batch/v1
kind: CronJob
metadata:
  name: scan-coverage
  labels:
    app.kubernetes.io/name: scan-coverage
    app.kubernetes.io/component: scan-pipeline
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: scan-coverage
            app.kubernetes.io/component: scan-pipeline
        spec:
          restartPolicy: Never
          serviceAccountName: knock
          securityContext:
            runAsNonRoot: true
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: coverage
              image: knock
              imagePullPolicy: IfNotPresent
              command: ["python3", "/scripts/scan-coverage.py"]
              env:
                - { name: REDIS_ADDR, value: "scan-queue-redis:6379" }
                - { name: SCAN_MAX_AGE_S, value: "604800" }
                - { name: PYTHONPATH, value: "/" }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: ["ALL"] }
              resources:
                requests: { cpu: 50m, memory: 64Mi }
                limits: { memory: 256Mi }
              volumeMounts:
                - { name: scripts, mountPath: /scripts, readOnly: true }
          volumes:
            - name: scripts
              configMap: { name: scan-pipeline-scripts, defaultMode: 0755 }
