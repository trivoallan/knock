# Stale-reaper: reclaims PEL entries (pending entries list) stuck in the consumer group
# after a worker that died between reserve and ack. Uses XAUTOCLAIM with a per-entry
# min-idle window (REAP_MIN_IDLE_MS), so a frequent schedule just bounds reclaim latency —
# the schedule no longer IS the staleness threshold (unlike the old LIST two-snapshot heuristic).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: scan-queue-reaper
  labels:
    app.kubernetes.io/name: scan-queue-reaper
    app.kubernetes.io/component: scan-pipeline
spec:
  schedule: "*/15 * * * *"   # bounds reclaim latency; per-entry idle threshold set via REAP_MIN_IDLE_MS
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: scan-queue-reaper
            app.kubernetes.io/component: scan-pipeline
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: reaper
              image: houba
              command: ["houba", "scan", "reaper"]
              args: ["--min-idle-ms", "1800000", "--max-deliveries", "5"]
              env:
                - name: HOUBA_SCAN_REDIS
                  value: '{"addr":"scan-queue-redis:6379","work":"houba:scan:work","dead":"houba:scan:dead","confirmed":"houba:scan:confirmed","placed":"houba:scan:placed","group":"scan"}'
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests: { cpu: 10m, memory: 32Mi }
                limits: { memory: 128Mi }
