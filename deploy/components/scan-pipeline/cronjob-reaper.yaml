# Stale-reaper: reclaims PEL entries (pending entries list) stuck in the consumer group
# after a worker that died between reserve and ack. Uses XAUTOCLAIM with a per-entry
# min-idle window (REAP_MIN_IDLE_MS), so a frequent schedule just bounds reclaim latency —
# the schedule no longer IS the staleness threshold (unlike the old LIST two-snapshot heuristic).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: scan-queue-reaper
  labels:
    app.kubernetes.io/name: scan-queue-reaper
    app.kubernetes.io/component: scan-pipeline
spec:
  schedule: "*/15 * * * *"   # bounds reclaim latency; per-entry idle threshold set via REAP_MIN_IDLE_MS
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: scan-queue-reaper
            app.kubernetes.io/component: scan-pipeline
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: reaper
              image: houba
              command: ["python3", "/scripts/scan-reaper.py"]
              env:
                - { name: REDIS_ADDR, value: "scan-queue-redis:6379" }
                - { name: REAP_MIN_IDLE_MS, value: "1800000" }
                - { name: MAX_DELIVERIES, value: "5" }
                - { name: PYTHONPATH, value: "/" }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests: { cpu: 10m, memory: 32Mi }
                limits: { memory: 128Mi }
              volumeMounts:
                - { name: scripts, mountPath: /scripts, readOnly: true }
          volumes:
            - name: scripts
              configMap: { name: scan-pipeline-scripts, defaultMode: 0755 }
