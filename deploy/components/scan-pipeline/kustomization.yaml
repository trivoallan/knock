# Incremental, reconcile-fed scan pipeline (spec 2026-06-25-platform-scan-pipeline-orchestration).
# Turns each digest houba reconcile places into a scan + attach + DT publish, off a Redis queue.
# Requires KEDA in the cluster (documented prereq, like components/keda-buildkitd).
# Must be listed AFTER the base (it patches cronjob-reconcile).
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - redis.yaml
  - scaledjob.yaml
  - cronjob-reaper.yaml
  - cronjob-coverage.yaml

patches:
  - path: patch-reconcile-enqueuer.yaml
    target:
      kind: CronJob
      name: houba-reconcile

configMapGenerator:
  - name: scan-pipeline-scripts
    files:
      - scan_streams.py=../../../scripts/scan_streams.py
      - scan-ack.py=../../../scripts/scan-ack.py
      - scan-dlq.py=../../../scripts/scan-dlq.py
      - scan-coverage.py=../../../scripts/scan-coverage.py
      - scan-one.sh=../../../scripts/scan-one.sh

generatorOptions:
  disableNameSuffixHash: true
