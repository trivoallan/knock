apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: scan-worker
  labels:
    app.kubernetes.io/name: scan-worker
    app.kubernetes.io/component: scan-pipeline
spec:
  pollingInterval: 15          # check the queue every 15s
  maxReplicaCount: 8           # the scan ceiling — tune to regis/grype capacity
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  triggers:
    - type: redis-streams
      metadata:
        # FQDN, not the bare name: the KEDA operator resolves this from the `keda`
        # namespace, so a same-namespace short name (scan-queue-redis) does not resolve.
        # The worker pods run in `knock` and keep the bare REDIS_ADDR.
        address: scan-queue-redis.knock.svc.cluster.local:6379
        stream: knock:scan:work
        # streamLength (XLEN) scales on OUTSTANDING work. NOT pendingEntriesCount: XPENDING is 0 for
        # un-read entries, so it would never spawn a worker for fresh work — a cold-start deadlock,
        # proven in the kind e2e (KEDA 2.20.1: pendingEntriesCount never fired, streamLength did).
        # XLEN counts un-read + reserved-unacked; acked entries are XTRIM'd in ack(), so the metric
        # drains to 0 when the queue clears. (No consumerGroup needed — XLEN is group-independent.)
        streamLength: "1"   # >=1 outstanding entry => one Job (up to maxReplicaCount)
        enableTLS: "false"
  jobTargetRef:
    backoffLimit: 0
    template:
      metadata:
        labels:
          app.kubernetes.io/name: scan-worker
      spec:
        serviceAccountName: knock
        restartPolicy: Never
        securityContext:
          runAsNonRoot: true
          seccompProfile: { type: RuntimeDefault }
        initContainers:
          - name: reserve            # XREADGROUP one digest -> /shared/reservation-token + /shared/digest
            image: knock
            command: ["knock", "scan", "reserve"]
            env:
              - name: KNOCK_SCAN_REDIS
                value: '{"addr":"scan-queue-redis:6379","work":"knock:scan:work","dead":"knock:scan:dead","confirmed":"knock:scan:confirmed","placed":"knock:scan:placed","group":"scan"}'
            volumeMounts:
              - { name: shared, mountPath: /shared }
          - name: fetch-sbom         # pull the reserved digest's CycloneDX SBOM (knock image: regctl)
            image: knock
            command: ["bash", "/scripts/scan-one.sh", "fetch"]
            env:
              - { name: HOME, value: /tmp }
            envFrom:
              - secretRef: { name: knock-registries }
            volumeMounts:
              - { name: shared, mountPath: /shared }
              - { name: scripts, mountPath: /scripts, readOnly: true }
              - { name: home, mountPath: /tmp }
          - name: scan               # grype the SBOM -> SARIF (no creds)
            # chainguard -dev: ships busybox sh AND runs nonroot, so it satisfies the pod's
            # runAsNonRoot policy (anchore/grype is distroless + root -> CreateContainerConfigError).
            # ponytail: -dev is a moving tag — pin a digest for reproducibility / air-gapped.
            image: cgr.dev/chainguard/grype:latest-dev
            command: ["sh", "-c"]
            args:
              - 'grype "sbom:/shared/sbom.json" -o sarif --file /shared/scan.sarif'
            env:
              - { name: GRYPE_DB_CACHE_DIR, value: /tmp/grype }   # writable cache
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            volumeMounts:
              - { name: shared, mountPath: /shared }
              - { name: home, mountPath: /tmp }
        containers:
          - name: attach             # knock scan attach: reads /shared/digest + /shared/reservation-token + /shared/scan.sarif
            image: knock
            command: ["knock", "scan", "attach"]
            env:
              - { name: HOME, value: /tmp }
              - name: KNOCK_SCAN_REDIS
                value: '{"addr":"scan-queue-redis:6379","work":"knock:scan:work","dead":"knock:scan:dead","confirmed":"knock:scan:confirmed","placed":"knock:scan:placed","group":"scan"}'
            envFrom:
              - secretRef: { name: knock-registries }
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            volumeMounts:
              - { name: shared, mountPath: /shared }
              - { name: home, mountPath: /tmp }
        volumes:
          - { name: shared, emptyDir: {} }
          - { name: home, emptyDir: {} }
          - name: scripts
            configMap: { name: scan-pipeline-scripts, defaultMode: 0755 }
