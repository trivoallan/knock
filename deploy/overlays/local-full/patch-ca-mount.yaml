# Mount the demo CA into the houba container at the path the transform config names.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: houba-reconcile
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: houba
              volumeMounts:
                - name: ca
                  mountPath: /etc/houba/certs
                  readOnly: true
          volumes:
            - name: ca
              configMap:
                name: houba-ca
