# Harbor destination. Create a robot account (e.g. robot$houba) with push rights
# on the `hardened` project and paste its token below. tls_verify=false only because
# the demo Harbor uses a self-signed cert; a real one needs tls_verify=true (default).
apiVersion: v1
kind: Secret
metadata:
  name: houba-registries
stringData:
  HOUBA_REGISTRIES: |
    {"local": {"host": "harbor.houba.svc.cluster.local", "username": "robot$houba", "password": "REPLACE_ME", "tls_verify": false}}
