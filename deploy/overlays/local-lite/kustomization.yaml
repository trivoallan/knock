# LITE demo — copy path only, into a throwaway in-cluster registry:2.
# Fast and self-contained: no buildkitd, anonymous HTTP registry, on-demand run.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: houba

resources:
  - ../../base
  - registry.yaml
  - secret-registries.yaml

patches:
  # On-demand: the CronJob is suspended; `make demo-lite-run` fires a one-shot Job from it.
  - path: patch-suspend.yaml
