# Demo roster: the in-cluster registry:2, anonymous + HTTP (tls_verify=false).
# A single entry means policies may omit `registry` entirely (resolves to the sole one).
# NOT a secret in spirit (no creds) — but houba reads the roster from this Secret name,
# so we keep the shape identical to prod (where it DOES carry credentials).
apiVersion: v1
kind: Secret
metadata:
  name: houba-registries
stringData:
  HOUBA_REGISTRIES: |
    {"local": {"host": "registry.houba.svc.cluster.local:5000", "tls_verify": false}}
