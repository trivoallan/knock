# Mount the overlay-local buildkitd.toml at /etc/buildkit. The daemon is then pointed
# at it via --config (appended to args in kustomization.yaml) — the rootless buildkit
# image does NOT auto-load the default config path. Volume + volumeMount merge by `name`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
spec:
  template:
    spec:
      containers:
        - name: buildkitd
          volumeMounts:
            - name: buildkitd-config
              mountPath: /etc/buildkit
              readOnly: true
      volumes:
        - name: buildkitd-config
          configMap:
            name: buildkitd-config
