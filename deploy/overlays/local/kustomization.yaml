# LOCAL overlay — the inner-loop escape hatch (kubectl apply -k), self-contained:
# buildkitd + a throwaway Zot registry, the plain-secret registry roster, NO operators.
# Reconciles the reference policy (busybox copy + debian rebuild). Renders local,
# uncommitted manifests; the CronJob is suspended and fired on demand by `make local`.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: houba

resources:
  - ../../base
  - registry.yaml
  - secret-registries.yaml

components:
  - ../../components/buildkitd
  - ../../components/dependency-track

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  # Point the reconcile + blast-radius at the reference policy.
  - name: houba-config
    behavior: merge
    literals:
      - POLICY_DIR=/policies/current/docs/examples/reference
      - BLAST_REPOS=demo/busybox demo/debian demo/debian-xz bypassed/debian-xz

patches:
  - path: patch-suspend.yaml
  # gc is suspended in the local loop too — fired on demand, never auto-deletes during a demo.
  - target:
      kind: CronJob
      name: houba-gc
    patch: |-
      - op: add
        path: /spec/suspend
        value: true
  # No buildkitd plain-HTTP config: houba derives BuildKit's `registry.insecure=true`
  # from the roster's `tls_verify=false` (same primitive regctl uses), so the rebuild
  # push to the plain-HTTP Zot works with the generic components/buildkitd as-is.
