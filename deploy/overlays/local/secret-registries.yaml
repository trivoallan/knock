# Demo roster: the in-cluster Zot, anonymous + HTTP (tls_verify=false).
# A single entry means policies may omit `registry` entirely (resolves to the sole one).
# NOT a secret in spirit (no creds) — but knock reads the roster from this Secret name,
# so we keep the shape identical to prod (where it DOES carry credentials).
apiVersion: v1
kind: Secret
metadata:
  name: knock-registries
stringData:
  KNOCK_REGISTRIES: |
    {"local": {"host": "registry.knock.svc.cluster.local:5000", "tls_verify": false}}
