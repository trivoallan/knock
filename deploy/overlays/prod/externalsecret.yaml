# Secrets are referenced, never embedded. This pulls the registry roster (host +
# robot-account token) from your secret backend via the External Secrets Operator,
# and materializes it as the `houba-registries` Secret the base consumes.
#
# Requires: External Secrets Operator installed + a ClusterSecretStore named
# `houba-secret-store` wired to your backend (Vault / AWS SM / GCP SM / …).
# Sealed Secrets is a fine alternative — drop a SealedSecret named `houba-registries`
# here instead and remove this file.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: houba-registries
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: houba-secret-store
    kind: ClusterSecretStore
  target:
    name: houba-registries
    creationPolicy: Owner
  data:
    - secretKey: HOUBA_REGISTRIES
      remoteRef:
        key: houba/registries
        property: HOUBA_REGISTRIES
