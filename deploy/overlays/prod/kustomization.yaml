# PROD blueprint — copy this overlay into your environment.
# Same base as the demos (anti-drift); differs only in: real registry via
# ExternalSecret, the org policy repo, a pinned published image, the rebuild
# add-on, and the live hourly schedule (no suspend).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: houba

resources:
  - ../../base
  - externalsecret.yaml

components:
  - ../../components/buildkitd
  # Autoscale buildkitd 1→K under build load (needs KEDA + Prometheus in the cluster).
  # Listed AFTER buildkitd: it targets that Deployment/Service. See ADR 0016.
  - ../../components/keda-buildkitd

# Pinned, published image (the demos use a kind-loaded houba:dev instead).
images:
  - name: houba
    newName: ghcr.io/trivoallan/houba
    newTag: v0.2.0

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: houba-config
    behavior: merge
    literals:
      # Policy repo (the front door). Defaults to the bundled busybox example so the
      # overlay reconciles a real policy out of the box (parity with the ArgoCD
      # sources/houba-prod default); repoint POLICY_REPO_URL + POLICY_DIR at YOUR org
      # policy repo when adopting.
      - POLICY_REPO_URL=https://github.com/trivoallan/houba
      - POLICY_REPO_REF=main
      - POLICY_DIR=/policies/current/docs/examples/busybox
      # Repos the blast-radius consumer walks — set to your mirrored namespaces.
      - BLAST_REPOS=demo/busybox
      # Org-specific transform data lives here (policies only NAME these):
      #   HOUBA_TRANSFORM_CA_CERTS={"corp":{"path":"/etc/houba/certs/corp-root.pem"}}
      #   HOUBA_TRANSFORM_PACKAGE_MIRRORS={"corp":{"apt":"https://mirror.corp/debian"}}
