# Team A (platform), image 1 of 2: a clean busybox, placed through the front door to
# platform/busybox. busybox carries no critical CVEs, so it PASSES the platform team's kargo gate
# (houba verify scan-pass) — part of the promoted half of the contrast.
apiVersion: houba.io/v1alpha1
kind: MirrorPolicy
metadata:
  name: team-platform-busybox
spec:
  artifactType: image
  defaults:
    vendor: Platform Team
    owners:
      - group:default/platform
  source:
    registry: docker.io
    repository: library/busybox
  imports:
    - name: base
      owners:
        - group:default/platform
      tags:
        includeRegex: "^1\\.37\\.0$"   # one stable tag → platform/busybox:1.37.0
      destinations:
        - project: platform
          repository: busybox
