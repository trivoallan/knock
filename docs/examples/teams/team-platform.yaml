# Team A (platform). Owns a clean busybox image, placed through the front door to platform/*.
# busybox carries no critical CVEs, so it PASSES its kargo gate (houba verify scan-pass) — the
# promoted half of the contrast. (A debian base would carry criticals and be held, so it can't
# play the "clean" role here.)
apiVersion: houba.io/v1alpha1
kind: MirrorPolicy
metadata:
  name: team-platform
spec:
  artifactType: image
  defaults:
    vendor: Platform Team
    owners:
      - group:default/platform
  source:
    registry: docker.io
    repository: library/busybox
  imports:
    - name: base
      owners:
        - group:default/platform
      tags:
        includeRegex: "^1\\.37\\.0$"   # one stable tag → platform/busybox:1.37.0
      destinations:
        - project: platform
          repository: busybox
