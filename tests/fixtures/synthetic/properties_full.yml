source:
  registry: docker.io
  repository: rancher/k3s
destination:
  harbor: both
  project: lib
  repository: k3s
tags:
  include_regex: "^v\\d+\\.\\d+\\.\\d+$"
  exclude_regex:
    - "-rc"
  semver_only: true
flags:
  add_apt_repos: true
  add_yum_repos: false
  update_keystore: true
  set_timezone: true
eol:
  product: kubernetes
archive:
  keep: 3
  older_than_days: 60
